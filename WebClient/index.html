<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTC Control Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>RTC Control Panel</h1>
        <div id="status-bar">
            <span id="status-indicator" class="status-indicator status-disconnected"></span>
            <span id="status-text">Disconnected</span>
            <span id="timestamp">--:--:--.---</span>
            <button id="sim-btn" onclick="simActive ? stopSim() : startSim()">Sim</button>
            <button id="operator-btn" title="Set operator name" aria-label="Operator">
                <svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor" aria-hidden="true">
                    <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                    <path d="M14 14s1 0 1-1-1-4-7-4-7 3-7 4 1 1 1 1h12z"/>
                </svg>
            </button>
            <button id="theme-btn" title="Toggle light/dark mode" aria-label="Toggle theme">
                <!-- moon icon (shown in dark mode) -->
                <svg id="theme-icon-moon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
                    <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
                </svg>
                <!-- sun icon (shown in light mode) -->
                <svg id="theme-icon-sun" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true" style="display:none">
                    <path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707z"/>
                </svg>
            </button>
        </div>
    </header>

    <nav id="tab-bar">
        <div id="tabs"></div>
        <button id="tab-add" title="New tab">+</button>
    </nav>

    <main id="tab-viewport"></main>

    <script src="js/chart.umd.min.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ws.js"></script>
    <script src="js/pid.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/dataview.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/objectSidebar.js"></script>
    <script src="js/console.js"></script>
    <script src="js/dev.js"></script>
    <script src="js/cards.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/valveDropdown.js"></script>
    <script src="js/alerts.js"></script>
    <script src="js/tabPersist.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sim.js"></script>
</body>
</html>
