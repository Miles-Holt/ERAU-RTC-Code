<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Layout Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
        }
        #editor-root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        .ed-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ed-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
        }
        .ed-filename {
            font-size: 0.78rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div id="editor-root"></div>
    <script src="js/editor.js"></script>
</body>
</html>
