# softChannels.yaml — software (virtual) channel definitions.
# Parsed by controlnode/softchan/store.go (New).
#
# Software channels live in control node memory. They appear in the browser
# Channel List and are commandable via the same cmd messages as hardware channels.
# Values are persisted to softChannelValues.yaml on every change and restored
# on restart, so tuned parameters survive a control node reboot.
#
# Schema:
#   refDes:      unique identifier (routed to "_SOFTCHAN" sentinel in the broker)
#   description: human-readable label
#   units:       engineering units string shown in the browser
#   role:        cmd-float | cmd-bool | (empty = read-only, set only by state machine)
#   default:     value used on first startup (before softChannelValues.yaml exists)
#   min/max:     optional bounds; Set() rejects values outside this range

channels:
  # ── Sequence Timings ──────────────────────────────────────────────────────────
  - refDes: SEQ-BURN-DUR
    description: Burn duration
    units: ms
    role: cmd-float
    default: 3000
    min: 500
    max: 10000

  - refDes: SEQ-IGN-LEAD
    description: Igniter lead time (before main valves open)
    units: ms
    role: cmd-float
    default: 500
    min: 0
    max: 5000

  # ── Abort Limits ──────────────────────────────────────────────────────────────
  - refDes: LIM-CPT01-HIGH
    description: Chamber pressure high abort threshold
    units: psia
    role: cmd-float
    default: 450
    min: 0
    max: 2000

  - refDes: LIM-CPT01-LOW
    description: Chamber pressure low abort threshold
    units: psia
    role: cmd-float
    default: 50
    min: 0
    max: 500

  # ── System State ──────────────────────────────────────────────────────────────
  - refDes: SYS-STATE
    description: Current system state (encoded as integer)
    units: ""
    role: ""
    default: 0

  - refDes: SYS-TARGET-STATE
    description: Requested state transition (set by operator)
    units: ""
    role: cmd-float
    default: 0
