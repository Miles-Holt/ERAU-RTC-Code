# daq001.yaml — TC3 PXIe DAQ node definition.
# Parsed by controlnode/config/yaml.go (ParseDir → daqNodes/*.yaml).
#
# modules: list the NI modules installed in the chassis. The moduleModelNumber
# must match the string used in controls.yaml channel entries (daqMx.module).
# Disabled modules are excluded from the config JSON sent to LabVIEW.

refDes: DAQ001
ip: MHOLT-AA
wsPort: 8001
description: PXIe configuration file
enabled: true

modules:
  - slotId: 1
    moduleModelNumber: Thermocouple
    description: Thermocouple Module
    enabled: true
    sampleRateHz: 1000
  - moduleModelNumber: Analog-Input
    description: Analog-input module
    enabled: true
    sampleRateHz: 1000
  - moduleModelNumber: Bridge-Completion-2
    description: Bridge Completion Modules
    enabled: true
    sampleRateHz: 1000
  - moduleModelNumber: Digital-IO
    description: Digital IO Module
    enabled: true
    sampleRateHz: 1000
  - moduleModelNumber: Analog-Output
    description: Analog-Output Module
    enabled: true
    sampleRateHz: 1000
