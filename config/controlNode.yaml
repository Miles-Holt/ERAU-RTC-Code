# controlNode.yaml — control node identity and virtual health channels.
# Parsed by controlnode/config/yaml.go (ParseDir).
#
# Health sensors are published as read-only virtual channels in the data stream
# at broadcastRateHz. They appear in the browser Channel List like any sensor.
#
# Health commands are routed internally (not to a DAQ node). Any command whose
# refDes contains "restart" causes the control node process to exit, which
# allows a process supervisor (e.g. systemd) to restart it cleanly.

refDes: CTR001
ip: MHOLT-LA
description: Central control and routing node
enabled: true

health:
  sensors:
    - refDes: CTR001-uptime
      description: CTR Node Uptime
      units: s
    - refDes: CTR001-loopTime
      description: CTR Broker Loop Time
      units: ms
    - refDes: CTR001-daqConnected
      description: DAQ Nodes Connected
      units: count
    - refDes: CTR001-wcConnected
      description: Web Clients Connected
      units: count

  commands:
    - refDes: CTR001-restart
      description: Force Restart CTR Node
      role: cmd-bool
